<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lucas Dev</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
    <h1>Lucas Dev 🚀</h1>
    <p>Clique para entrar</p>
</div>

<div id="mainContent">

    <header>
        <img id="avatar" src="">
        <h1>Lucas Dev</h1>
        <p id="status">Carregando...</p>
    </header>

    <div class="card">
        <h2>Música 🎵</h2>
        <button onclick="toggleMusica()">Play / Pause</button>
        <br><br>
        <input type="range" min="0" max="1" step="0.1" onchange="mudarVolume(this.value)">
        <br><br>
        <button onclick="trocarMusica()">Trocar Música</button>
    </div>

</div>

<audio id="musica" loop>
    <source src="audio/musica.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
